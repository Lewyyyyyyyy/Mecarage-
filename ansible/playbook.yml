---
# ══════════════════════════════════════════════════════════════
# MecaManage — Playbook Ansible — Déploiement complet
# ══════════════════════════════════════════════════════════════

- name: Déploiement MecaManage
  hosts: mecamanage_servers
  become: yes
  become_method: sudo

  vars:
    postgres_db: mecamanage
    postgres_user: mecamanage_user
    postgres_password: "{{ lookup('env', 'DB_PASSWORD') }}"
    jwt_secret: "{{ lookup('env', 'JWT_SECRET') }}"
    gemini_api_key: "{{ lookup('env', 'GEMINI_API_KEY') }}"

  roles:
    - docker
    - deploy

  post_tasks:
    - name: Vérifier le health check backend
      uri:
        url: http://localhost:5073/swagger
        status_code: 200
      retries: 5
      delay: 10
      ignore_errors: yes

    - name: Vérifier le health check IA
      uri:
        url: http://localhost:8000/health
        status_code: 200
      retries: 5
      delay: 10
      ignore_errors: yes

    - name: Déploiement terminé
      debug:
        msg: "✅ MecaManage déployé avec succès sur {{ inventory_hostname }}"