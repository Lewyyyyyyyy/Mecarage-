---
# ── Installation Docker sur le serveur Ubuntu ──────────────

- name: Mettre à jour les paquets apt
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Installer les dépendances Docker
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Ajouter la clé GPG Docker
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Ajouter le repository Docker
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu focal stable"
    state: present

- name: Installer Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
    update_cache: yes

- name: Installer Docker Compose
  apt:
    name: docker-compose-plugin
    state: present

- name: Démarrer et activer Docker
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Ajouter ubuntu au groupe docker
  user:
    name: ubuntu
    groups: docker
    append: yes