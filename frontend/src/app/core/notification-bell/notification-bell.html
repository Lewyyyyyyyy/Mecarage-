<div class="relative">
  <!-- Bell button -->
  <button
    (click)="toggleDropdown()"
    class="relative p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400"
    aria-label="Notifications"
  >
    <!-- Bell icon -->
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-2.83-2h5.66A3 3 0 0110 18z" />
    </svg>
    <!-- Unread badge -->
    @if (unreadCount() > 0) {
      <span class="absolute -top-0.5 -right-0.5 h-4 w-4 flex items-center justify-center text-[10px] font-bold text-white bg-red-500 rounded-full">
        {{ unreadCount() > 9 ? '9+' : unreadCount() }}
      </span>
    }
  </button>

  <!-- Dropdown -->
  @if (isOpen()) {
    <!-- Backdrop -->
    <div class="fixed inset-0 z-40" (click)="isOpen.set(false)"></div>

    <div class="absolute right-0 mt-2 w-80 bg-white dark:bg-gray-900 rounded-xl shadow-xl border border-gray-200 dark:border-gray-700 z-50 overflow-hidden">
      <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-800 flex items-center justify-between">
        <h3 class="font-bold text-gray-900 dark:text-white text-sm">Notifications</h3>
        @if (unreadCount() > 0) {
          <span class="text-xs text-indigo-600 dark:text-indigo-400 font-semibold">{{ unreadCount() }} non lue(s)</span>
        }
      </div>

      <div class="max-h-96 overflow-y-auto divide-y divide-gray-100 dark:divide-gray-800">
        @if (notifications().length === 0) {
          <div class="px-4 py-8 text-center text-sm text-gray-500 dark:text-gray-400">
            Aucune notification
          </div>
        }
        @for (notif of notifications(); track notif.id) {
          <button
            (click)="markAndNavigate(notif)"
            [ngClass]="!notif.isRead ? 'bg-indigo-50 dark:bg-indigo-900/10' : ''"
            class="w-full text-left px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors"
          >
            <div class="flex items-start gap-3">
              <span class="mt-0.5 text-base shrink-0">
                @switch (notif.notificationType) {
                  @case ('ChefFeedbackApproved') { ✅ }
                  @case ('ChefFeedbackDeclined') { ❌ }
                  @case ('InvoiceReady') { 💰 }
                  @case ('ExaminationDeclined') { 🚫 }
                  @case ('ReadyForPickup') { 🚗 }
                  @default { 🔔 }
                }
              </span>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-gray-900 dark:text-white truncate">{{ notif.title }}</p>
                <p class="text-xs text-gray-600 dark:text-gray-400 mt-0.5 line-clamp-2">{{ notif.message }}</p>
                <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">{{ formatDate(notif.createdAt) }}</p>
              </div>
              @if (!notif.isRead) {
                <span class="w-2 h-2 bg-indigo-500 rounded-full shrink-0 mt-1.5"></span>
              }
            </div>
          </button>
        }
      </div>
    </div>
  }
</div>
