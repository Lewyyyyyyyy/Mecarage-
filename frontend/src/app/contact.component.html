<div class="min-h-screen bg-gray-50 dark:bg-gray-950 p-6 transition-colors duration-300">
  <div class="max-w-7xl mx-auto space-y-12">
    <!-- Header Section -->
    <div class="text-center space-y-4">
      <h1 class="text-4xl font-black text-gray-900 dark:text-white tracking-tight">Get in Touch</h1>
      <p class="text-xl text-gray-600 dark:text-gray-400 max-w-2xl mx-auto">
        Have questions about our services or need to schedule a custom repair? Our team is here to help.
      </p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
      <!-- Contact Form Card -->
      <div class="bg-white dark:bg-gray-900 p-8 rounded-3xl border border-gray-100 dark:border-gray-800 shadow-xl">
        <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Your Name</label>
              <input formControlName="name" type="text" placeholder="John Doe"
                class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border-0 text-gray-900 dark:text-white rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
              <input formControlName="email" type="email" placeholder="john@example.com"
                class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border-0 text-gray-900 dark:text-white rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
            </div>
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Subject</label>
            <input formControlName="subject" type="text" placeholder="How can we help?"
              class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border-0 text-gray-900 dark:text-white rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Message</label>
            <textarea formControlName="message" rows="5" placeholder="Tell us more about your needs..."
              class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border-0 text-gray-900 dark:text-white rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all outline-none resize-none"></textarea>
          </div>
          <button type="submit" [disabled]="contactForm.invalid"
            class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-black text-lg rounded-2xl transition-all transform hover:scale-[1.01] active:scale-[0.99] disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-indigo-200 dark:shadow-none">
            Send Message
          </button>
        </form>
      </div>

      <!-- Contact Info Section -->
      <div class="space-y-8">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div class="p-6 bg-white dark:bg-gray-900 rounded-3xl border border-gray-100 dark:border-gray-800 shadow-sm">
            <div class="w-12 h-12 bg-indigo-100 dark:bg-indigo-900/30 rounded-2xl flex items-center justify-center text-indigo-600 dark:text-indigo-400 mb-4">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </div>
            <h3 class="font-bold text-gray-900 dark:text-white mb-2">Our Location</h3>
            <p class="text-gray-600 dark:text-gray-400 text-sm">123 Mechanics Way, Tech City, TC 54321</p>
          </div>
          <div class="p-6 bg-white dark:bg-gray-900 rounded-3xl border border-gray-100 dark:border-gray-800 shadow-sm">
            <div class="w-12 h-12 bg-emerald-100 dark:bg-emerald-900/30 rounded-2xl flex items-center justify-center text-emerald-600 dark:text-emerald-400 mb-4">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
              </svg>
            </div>
            <h3 class="font-bold text-gray-900 dark:text-white mb-2">Call Us</h3>
            <p class="text-gray-600 dark:text-gray-400 text-sm">(555) 123-4567</p>
            <p class="text-gray-600 dark:text-gray-400 text-sm">Mon - Fri: 8am - 6pm</p>
          </div>
        </div>

        <!-- Map Placeholder -->
        <div class="h-80 bg-gray-200 dark:bg-gray-800 rounded-3xl overflow-hidden relative border border-gray-100 dark:border-gray-800">
          <div class="absolute inset-0 flex items-center justify-center">
            <div class="text-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-400 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L10 7l6-3 5.447 2.724a1 1 0 01.553.894v10.764a1 1 0 01-1.447.894L15 17l-6 3z" />
              </svg>
              <span class="text-gray-500 font-medium italic">Interactive Map View Placeholder</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
