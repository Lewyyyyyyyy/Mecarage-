version: "3.9"

# ══════════════════════════════════════════════════════════════
# MecaManage — Docker Compose
# Services : frontend + backend + ia-service + mysql + redis + n8n + nginx
# ══════════════════════════════════════════════════════════════

services:

  # ── MySQL 8 ──────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mecamanage-mysql
    restart: unless-stopped
    init: true
    command: --default-authentication-plugin=mysql_native_password
    security_opt:
      - no-new-privileges:true
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_HOST: ${MYSQL_ROOT_HOST}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - mecamanage-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis 7 ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mecamanage-redis
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    volumes:
      - redis-data:/data
    networks:
      - mecamanage-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Frontend Angular (static site) ───────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-mecamanage-frontend:local}
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: mecamanage-frontend
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy
      ia-service:
        condition: service_healthy
    networks:
      - mecamanage-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Backend ASP.NET Core 9 ────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-mecamanage-backend:local}
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: mecamanage-backend
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
      ConnectionStrings__Redis: ${REDIS_CONNECTION}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mecamanage-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5073/swagger/v1/swagger.json >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── IA Service FastAPI ────────────────────────────────────────
  ia-service:
    image: ${IA_SERVICE_IMAGE:-mecamanage-ia:local}
    build:
      context: ../ia-service
      dockerfile: Dockerfile
    container_name: mecamanage-ia
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES}
      GEMINI_RETRY_DELAY_SECONDS: ${GEMINI_RETRY_DELAY_SECONDS}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mecamanage-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── n8n Workflow Automation ───────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: mecamanage-n8n
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      DB_TYPE: mysqldb
      DB_MYSQLDB_HOST: mysql
      DB_MYSQLDB_PORT: 3306
      DB_MYSQLDB_DATABASE: ${N8N_DATABASE}
      DB_MYSQLDB_USER: root
      DB_MYSQLDB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mecamanage-net

  # ── NGINX Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mecamanage-nginx
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "80:80"
    tmpfs:
      - /var/cache/nginx
      - /var/run
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      ia-service:
        condition: service_healthy
    networks:
      - mecamanage-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: mecamanage-prometheus
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - mecamanage-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: mecamanage-grafana
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_ALERTING_ENABLED: "true"
      GF_SMTP_ENABLED: ${GRAFANA_SMTP_ENABLED}
      GF_SMTP_HOST: ${GRAFANA_SMTP_HOST}
      GF_SMTP_USER: ${GRAFANA_SMTP_USER}
      GF_SMTP_PASSWORD: ${GRAFANA_SMTP_PASSWORD}
      GF_SMTP_FROM_ADDRESS: ${GRAFANA_SMTP_FROM_ADDRESS}
      GF_SMTP_FROM_NAME: ${GRAFANA_SMTP_FROM_NAME}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - mecamanage-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── cAdvisor — métriques conteneurs Docker ────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: mecamanage-cadvisor
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - mecamanage-net

# ── Volumes persistants ───────────────────────────────────────
volumes:
  mysql-data:
    name: mecamanage-mysql-data
  redis-data:
    name: mecamanage-redis-data
  n8n-data:
    name: mecamanage-n8n-data
  prometheus-data:
    name: mecamanage-prometheus-data
  grafana-data:
    name: mecamanage-grafana-data

# ── Réseau isolé ──────────────────────────────────────────────
networks:
  mecamanage-net:
    name: mecamanage-net
    driver: bridge
