version: "3.9"

# ══════════════════════════════════════════════════════════════
# MecaManage — Docker Compose (Production)
# Services: frontend + backend + mysql + nginx
# ══════════════════════════════════════════════════════════════

services:

  # ── MySQL 8 ──────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mecamanage-mysql
    restart: unless-stopped
    init: true
    command: --default-authentication-plugin=mysql_native_password
    security_opt:
      - no-new-privileges:true
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mecarage}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-iheb}
      MYSQL_ROOT_HOST: ${MYSQL_ROOT_HOST:-%}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - mecamanage-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend ASP.NET Core 9 ────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-mecamanage-backend:latest}
    container_name: mecamanage-backend
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING:-"Server=mysql;Port=3306;Database=mecarage;Uid=root;Pwd=iheb;"}
      Jwt__Secret: ${JWT_SECRET:-"your-secret-key-change-in-production"}
      Jwt__Issuer: ${JWT_ISSUER:-"mecamanage"}
      Jwt__Audience: ${JWT_AUDIENCE:-"mecamanage-api"}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mecamanage-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Frontend Angular (static site) ───────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-mecamanage-frontend:latest}
    container_name: mecamanage-frontend
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mecamanage-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── NGINX Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: mecamanage-nginx
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"
      - "443:443"
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - mecamanage-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  mecamanage-net:
    driver: bridge
    name: mecamanage-net

volumes:
  mysql-data:
    driver: local

