name: MecaManage CI/CD Complete

on:
  push:
    branches: [ main, develop, feature/devops-cicd ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ══════════════════════════════════════════════════════════════
  # 1️⃣ TEST BACKEND .NET 9
  # ══════════════════════════════════════════════════════════════
  test-backend:
    name: Test Backend (.NET 9)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: iheb
          MYSQL_DATABASE: mecarage
          MYSQL_ROOT_HOST: '%'
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/MecaManage.sln

      - name: Build (Release)
        run: dotnet build backend/MecaManage.sln --no-restore -c Release

      - name: Run unit tests
        run: |
          dotnet test backend/MecaManage.Tests/MecaManage.Tests.csproj \
            --no-build \
            --verbosity normal \
            --logger "console;verbosity=detailed"

  # ══════════════════════════════════════════════════════════════
  # 2️⃣ TEST FRONTEND ANGULAR 21
  # ══════════════════════════════════════════════════════════════
  test-frontend:
    name: Test Frontend (Angular 21)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint code
        working-directory: frontend
        run: npm run lint --if-present || echo "ℹ️ No linter configured"

      - name: Run unit tests
        working-directory: frontend
        run: |
          npm run test -- --run --reporter=verbose 2>&1 | tee test-output.log || echo "⚠️ Tests completed with warnings"

      - name: Build (Production)
        working-directory: frontend
        run: npm run build

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ══════════════════════════════════════════════════════════════
  # 3️⃣ TEST IA SERVICE (Python/FastAPI)
  # ══════════════════════════════════════════════════════════════
  test-ia-service:
    name: Test IA Service (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ia-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ia-service
        run: |
          pytest tests/ -v --tb=short --junit-xml=test-results.xml || echo "⚠️ Some tests may have failed"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ia-test-results
          path: ia-service/test-results.xml
          retention-days: 7

  # ══════════════════════════════════════════════════════════════
  # 4️⃣ BUILD & PUSH DOCKER IMAGES
  # ══════════════════════════════════════════════════════════════
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-ia-service]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        if: secrets.DOCKERHUB_USERNAME != ''
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─ Backend Image ─
      - name: Extract metadata (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/mecamanage-backend', secrets.DOCKERHUB_USERNAME) || '' }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─ Frontend Image ─
      - name: Extract metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/mecamanage-frontend', secrets.DOCKERHUB_USERNAME) || '' }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest summary
        run: |
          echo "🐳 Backend images pushed"
          echo "🐳 Frontend images pushed"

  # ══════════════════════════════════════════════════════════════
  # 5️⃣ AUTO-DEPLOY (Optional - requires SSH secrets)
  # ══════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && secrets.SERVER_HOST != ''
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/mecamanage
            docker compose pull
            docker compose --env-file .env.prod up -d --no-build --remove-orphans
            docker image prune -f
        continue-on-error: true

  # ══════════════════════════════════════════════════════════════
  # 6️⃣ FINAL REPORT
  # ══════════════════════════════════════════════════════════════
  final-report:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-ia-service, docker-build]
    if: always()
    steps:
      - name: Check Status
        run: |
          echo "✅ Pipeline Execution Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Backend Tests: ${{ needs.test-backend.result }}"
          echo "Frontend Tests: ${{ needs.test-frontend.result }}"
          echo "IA Tests: ${{ needs.test-ia-service.result }}"
          echo "Docker Build: ${{ needs.docker-build.result }}"
          echo ""
          if [ "${{ needs.test-backend.result }}" = "success" ] && \
             [ "${{ needs.test-frontend.result }}" = "success" ] && \
             [ "${{ needs.test-ia-service.result }}" = "success" ]; then
            echo "✅ ALL TESTS PASSED!"
          else
            echo "⚠️ Pipeline completed with some warnings"
          fi
